version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./sql_app.db
      - XAI_API_KEY=${XAI_API_KEY}
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

  # Oracle 23ai Free Database (Optional, uncomment to use)
  # oracle-db:
  #   image: container-registry.oracle.com/database/free:latest
  #   ports:
  #     - "1521:1521"
  #   environment:
  #     - ORACLE_PWD=SysPassword1
  #   volumes:
  #     - oradata:/opt/oracle/oradata

volumes:
  oradata:
